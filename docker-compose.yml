version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ims_postgres
    environment:
      POSTGRES_USER: ims_user
      POSTGRES_PASSWORD: ims_pass
      POSTGRES_DB: ims_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ims_user -d ims_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7
    container_name: ims_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ims_user
      MONGO_INITDB_ROOT_PASSWORD: ims_pass
      MONGO_INITDB_DATABASE: ims_signals
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ims_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ims_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://ims_user:ims_pass@postgres:5432/ims_db
      MONGODB_URL: mongodb://ims_user:ims_pass@mongodb:27017/ims_signals?authSource=admin
      REDIS_URL: redis://redis:6379/0
      SIGNAL_BUFFER_SIZE: "50000"
      RATE_LIMIT_PER_SECOND: "15000"
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ims_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pg_data:
  mongo_data:
  redis_data:
